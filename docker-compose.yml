# Append to the existing server docker-compose.yml.
# Assumes the existing mst-ag-01-network is already defined elsewhere.
services:
  mst-ag-gateway:
    image: ghcr.io/blameturner/mst-ag-gateway:latest
    container_name: mst-ag-gateway
    environment:
      - PORT=3900
      - HARNESS_URL=http://mst-ag-harness:3800
      - NOCODB_URL=http://nocodb:8080
      - NOCODB_TOKEN=your_token
      - NOCODB_BASE_ID=your_base_id
      - BETTER_AUTH_SECRET=your_secret
      - BETTER_AUTH_URL=http://localhost:3900
      - DATABASE_URL=file:/data/auth.db
      - ALLOW_REGISTRATION=true
      - ENVIRONMENT=production
      - FRONTEND_ORIGIN=http://100.96.243.61:3000
    volumes:
      - ./data/auth:/data
    ports:
      - "3900:3900"
    restart: unless-stopped
    networks:
      - mst-ag-01-network

  mst-ag-frontend:
    image: ghcr.io/blameturner/mst-ag-frontend:latest
    container_name: mst-ag-frontend
    environment:
      # Read at container start by /docker-entrypoint.d/40-write-config.sh and written
      # into /usr/share/nginx/html/config.js — nothing is baked into the Vite bundle.
      - GATEWAY_URL=http://100.96.243.61:3900
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - mst-ag-01-network

networks:
  mst-ag-01-network:
    external: true
